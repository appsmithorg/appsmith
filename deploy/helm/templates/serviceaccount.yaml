{{- if .Values.serviceAccount.create }}
{{- /*
Purpose: Create ServiceAccount for Appsmith pods with RBAC configuration
Used by: Deployment/StatefulSet pods for resource access and authentication
RBAC: Role and RoleBinding define permissions for pod operations
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "appsmith.serviceAccountName" . }}
  namespace: {{ include "appsmith.namespace" . }}
  labels: 
    {{- include "appsmith.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
  {{- if or .Values.serviceAccount.annotations .Values.commonAnnotations }}
  annotations:
    description: "ServiceAccount for Appsmith pod authentication and authorization"
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-view: "false"
    {{- if .Values.serviceAccount.annotations }}
    {{ toYaml .Values.serviceAccount.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.commonAnnotations }}
    {{- include "tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
  {{- end }}

# Secret reference for image pull and API access
secrets:
  - name: {{ template "appsmith.fullname" . }}
{{- end }}