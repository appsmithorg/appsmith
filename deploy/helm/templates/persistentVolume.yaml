{{- /*
Purpose: Create Kubernetes PersistentVolume for Appsmith data persistence
Supports: EFS (AWS), NFS, EBS (AWS), and local storage backends
Conditions: Only created when persistence is enabled and no existing claim is used
Author: Appsmith Team
Last Updated: 2026-04-04
*/ -}}
{{- $workloadKind := upper (toString .Values.workload.kind) -}}
{{- $useDeployment := or (eq $workloadKind "DEPLOYMENT") .Values.autoscaling.enabled }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim.enabled) $useDeployment }}
{{- if not .Values.persistence.size }}
  {{- fail "persistence.size is required when persistence is enabled" }}
{{- end }}
{{- if .Values.persistence.efs.enabled }}
  {{- if not .Values.persistence.efs.driver }}
    {{- fail "persistence.efs.driver is required when EFS is enabled" }}
  {{- end }}
  {{- if not .Values.persistence.efs.volumeHandle }}
    {{- fail "persistence.efs.volumeHandle is required when EFS is enabled" }}
  {{- end }}
{{- end }}
{{- if .Values.persistence.nfs.enabled }}
  {{- if not .Values.persistence.nfs.server }}
    {{- fail "persistence.nfs.server is required when NFS is enabled" }}
  {{- end }}
  {{- if not .Values.persistence.nfs.path }}
    {{- fail "persistence.nfs.path is required when NFS is enabled" }}
  {{- end }}
{{- end }}
{{- if .Values.persistence.ebs.enabled }}
  {{- if not .Values.persistence.ebs.volumeID }}
    {{- fail "persistence.ebs.volumeID is required when EBS is enabled" }}
  {{- end }}
{{- end }}
{{- if .Values.persistence.gcp.enabled }}
  {{- if not .Values.persistence.gcp.pdName }}
    {{- fail "persistence.gcp.pdName is required when GCP Persistent Disk is enabled" }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "appsmith.pvName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: appsmith
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/component: persistence
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    helm.sh/chart: {{ include "appsmith.chart" . | quote }}
  annotations:
    volume.beta.kubernetes.io/storage-class: {{ .Values.persistence.storageClass | default "default" | quote }}
    {{- if .Values.persistence.backup.enabled }}
    backup.velero.io/backup-volumes: appsmith-data
    {{- end }}
    {{- if .Values.persistence.retention.policy }}
    retention.policy: {{ .Values.persistence.retention.policy | quote }}
    {{- end }}
    {{- if .Values.persistence.retention.days }}
    retention.days: {{ .Values.persistence.retention.days | quote }}
    {{- end }}
    description: "Appsmith persistent volume for application data storage"
spec:
  # Storage capacity allocation
  capacity:
    storage: {{ .Values.persistence.size | quote }}
  
  # Volume mode: Filesystem for mounting as directory
  volumeMode: Filesystem
  
  # Access modes: RWO (ReadWriteOnce), ROX (ReadOnlyMany), RWX (ReadWriteMany)
  accessModes:
  {{- range .Values.persistence.accessModes }}
    - {{ . | quote }}
  {{- end }}
  
  # Reclaim policy: Delete, Retain, or Recycle
  persistentVolumeReclaimPolicy: {{ .Values.persistence.reclaimPolicy }}
  
  {{- if .Values.persistence.localStorage }}
  # Local storage backend - requires nodeAffinity to bind to specific node
  local:
    path: {{ .Values.persistence.storagePath }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values: 
            {{- toYaml .Values.persistence.localCluster | nindent 12 }}
  {{- end }}
  
  {{- if .Values.persistence.storageClass }}
  # Storage class for dynamic provisioning
  {{- if (eq "-" .Values.persistence.storageClass) }}
  storageClassName: ""
  {{- else }}
  storageClassName: "{{ .Values.persistence.storageClass }}"
  {{- end }}
  {{- end }}
  
  {{- if .Values.persistence.efs.enabled }}
  # AWS EFS via CSI driver - suitable for multi-AZ deployments
  csi:
    driver: {{ .Values.persistence.efs.driver | quote }}
    volumeHandle: {{ .Values.persistence.efs.volumeHandle | quote }}
  {{- end }}
  
  {{- if .Values.persistence.nfs.enabled }}
  # NFS storage - suitable for on-premises and hybrid deployments
  nfs:
    server: {{ .Values.persistence.nfs.server | quote }}
    path: {{ .Values.persistence.nfs.path | quote }}
    {{- if .Values.persistence.nfs.readOnly }}
    readOnly: true
    {{- end }}
  {{- end }}
  
  {{- if .Values.persistence.ebs.enabled }}
  # AWS EBS - suitable for single-AZ high-performance requirements
  awsElasticBlockStore:
    volumeID: {{ .Values.persistence.ebs.volumeID | quote }}
    fsType: {{ .Values.persistence.ebs.fsType | default "ext4" | quote }}
    {{- if .Values.persistence.ebs.readOnly }}
    readOnly: true
    {{- end }}
  {{- end }}
  
  {{- if .Values.persistence.gcp.enabled }}
  # GCP Persistent Disk - suitable for GKE deployments
  gcePersistentDisk:
    pdName: {{ .Values.persistence.gcp.pdName | quote }}
    fsType: {{ .Values.persistence.gcp.fsType | default "ext4" | quote }}
    {{- if .Values.persistence.gcp.readOnly }}
    readOnly: true
    {{- end }}
  {{- end }}
{{- end }}