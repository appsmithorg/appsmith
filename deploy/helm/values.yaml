# @schema description: Ingress configuration for exposing Appsmith over HTTP(S).
ingress:
  ## @param ingress.enabled Enable Ingress record generation for Appsmith
  ##
  # @schema description: Enable Ingress record generation for Appsmith.
  # -- Enable Ingress record generation for Appsmith
  # @section -- Networking
  enabled: false
  ## @param ingress.annotations Additional custom annotations for the ingress record
  ## NOTE: If `ingress.certManager=true`, annotation `kubernetes.io/tls-acme: "true"` will automatically be added
  ##
  # @schema description: Additional custom annotations for the Ingress record.
  # -- Additional custom annotations for the ingress record
  # @section -- Networking
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  ## @param ingress.hosts Hosts served by the Ingress
  # @schema description: Hosts served by the Ingress (list of objects with at least a host field).
  # -- Hosts served by the Ingress
  # @section -- Networking
  hosts: []
    # - host: appsmith-domain.me
  ## @param ingress.tls Enable TLS configuration for the host defined at `ingress.hosts` parameter
  ## You can:
  ##   - Use the `ingress.secrets` parameter to create this TLS secret
  ##   - Relay on cert-manager to create it by setting `ingress.certManager=true`
  ##   - Relay on Helm to create self-signed certificates by setting `ingress.selfSigned=true`
  ##
  # @schema description: Enable TLS configuration for the host(s) defined at ingress.hosts.
  # -- Enable TLS configuration for the host defined at `ingress.hosts` parameter
  # @section -- Networking
  tls: false
  ## @param ingress.secrets Custom TLS certificates as secrets
  ## NOTE: 'key' and 'certificate' are expected in PEM format
  ## NOTE: 'name' should line up with a 'secretName' set further up
  ## If it is not set and you're using cert-manager, this is unneeded, as it will create a secret for you with valid certificates
  ## If it is not set and you're NOT using cert-manager either, self-signed certificates will be created valid for 365 days
  ## It is also possible to create and manage the certificates outside of this helm chart
  ## Please see README.md for more information
  ## e.g:
  ## secrets:
  ##   - host: chart-example.local
  ##     key: |-
  ##       -----BEGIN RSA PRIVATE KEY-----
  ##       ...
  ##       -----END RSA PRIVATE KEY-----
  ##     certificate: |-
  ##       -----BEGIN CERTIFICATE-----
  ##       ...
  ##       -----END CERTIFICATE-----
  ##
  # @schema description: Custom TLS certificates as secrets. 'key' and 'certificate' are expected in PEM format.
  # -- Custom TLS certificates as secrets
  # @section -- Networking
  secrets: []
  ## @param ingress.certManager Enable ingress to use TLS certificates provided by Cert Manager
  ##
  # @schema description: Enable Ingress to use TLS certificates provided by cert-manager.
  # -- Enable ingress to use TLS certificates provided by Cert Manager
  # @section -- Networking
  certManager: false
  ## @param ingress.certManagerTls Specify the TLS secret created by Cert Manager
  ## e.g:
  ## certManagerTls:
  ##   - hosts:
  ##       - appsmith-domain.me
  ##     secretName: appsmith-tls
  # @schema description: Specify TLS secrets created by cert-manager.
  # -- Specify the TLS secret created by Cert Manager
  # @section -- Networking
  certManagerTls: []
  ## @param ingress.className IngressClass name for the Ingress resource
  ## e.g:
  ## className: "nginx"
  ##
  # @schema description: IngressClass name to use for the Ingress resource.
  # -- IngressClass name for the Ingress resource
  # @section -- Networking
  className: "nginx"

# @schema description: Persistence configuration for Appsmith data volumes.
persistence:
  ## @param persistence.enabled - Enable data persistence using PVC
  ##
  # @schema description: Enable data persistence using a PVC.
  # -- Enable data persistence using PVC
  # @section -- Persistence
  enabled: true
  ## @param persistence.storageClass PVC Storage Class
  ##
  # @schema description: PVC StorageClass. Empty uses the cluster default (or global.storageClass).
  # -- PVC Storage Class
  # @section -- Persistence
  storageClass: ""
  ## @param persistence.annotations Additional custom annotations for the PVC
  ##
  # @schema description: Additional custom annotations for the PVC.
  # -- Additional custom annotations for the PVC
  # @section -- Persistence
  annotations: {}
  ## @param persistence.localStorage - Use local storage for PVC
  ##
  # @schema description: Use local storage for the PVC.
  # -- Use local storage for PVC
  # @section -- Persistence
  localStorage: false
  ## @param persistence.storagePath - local storage path
  ##
  # @schema description: Local storage path used when localStorage is true.
  # -- Local storage path
  # @section -- Persistence
  storagePath: /tmp/hostpath_pv
  ## @param persistence.localCluster
  ##
  # @schema description: Local cluster configuration for local-storage scenarios.
  # -- Local cluster configuration for local-storage scenarios
  # @section -- Persistence
  localCluster: {}
  ## @param persistence.accessModes PV Access Mode
  ##
  # @schema description: PV access modes.
  # @schema item: string; itemEnum: ["ReadWriteOnce", "ReadOnlyMany", "ReadWriteMany", "ReadWriteOncePod"]
  # -- PV Access Mode
  # @section -- Persistence
  accessModes:
    - ReadWriteMany
  ## @param persistence.size PVC Storage Request
  ##
  # @schema description: PVC storage request size.
  # -- PVC Storage Request
  # @section -- Persistence
  size: 10Gi
  ## Fine tuning for volumeClaimTemplates
  ##
  ## @param persistence.reclaimPolicy Reclaim policy for the PV
  # @schema description: Reclaim policy for the PV.
  # @schema enum: [Retain, Delete, Recycle]
  # -- Reclaim policy for the PV
  # @section -- Persistence
  reclaimPolicy: Retain

  ## @param persistence.pvNameOverride Override the PV name
  ## Useful when deploying multiple releases across different namespaces with the same name
  ## since PersistentVolumes are cluster-scoped resources
  ##
  # @schema description: Override the PV name. Useful when deploying multiple releases across different namespaces with the same name since PersistentVolumes are cluster-scoped.
  # -- Override the PV name
  # @section -- Persistence
  pvNameOverride: ""

  # @schema description: Use an existing PVC instead of creating one.
  existingClaim:
    ## @param persistence.existingClaim.enabled Use an existing PVC instead of creating one
    # @schema type: [boolean, "null"]; description: Set to true to mount an existing PVC instead of provisioning a new one.
    # -- Use an existing PVC instead of creating one
    # @section -- Persistence
    enabled:
    ## @param persistence.existingClaim.name Name used to look up the existing PVC
    # @schema type: [string, "null"]; description: Name used to look up the existing PVC.
    # -- Name used to look up the existing PVC
    # @section -- Persistence
    name:
    ## @param persistence.existingClaim.claimName Explicit claimName to set on the volume mount
    # @schema type: [string, "null"]; description: Explicit claimName to set on the pod's volume mount.
    # -- Explicit claimName to set on the volume mount
    # @section -- Persistence
    claimName:
  # @schema description: AWS EFS CSI driver configuration when using an EFS-backed volume.
  efs:
    ## @param persistence.efs.enabled Enable EFS-backed persistence
    # @schema type: [boolean, "null"]; description: Enable EFS-backed persistence.
    # -- Enable EFS-backed persistence
    # @section -- Persistence
    enabled:
    ## @param persistence.efs.driver CSI driver name for the EFS volume
    # @schema type: [string, "null"]; description: CSI driver name for the EFS volume.
    # -- CSI driver name for the EFS volume
    # @section -- Persistence
    driver:
    ## @param persistence.efs.volumeHandle EFS filesystem volume handle (fs-xxxx[::access-point])
    # @schema type: [string, "null"]; description: EFS filesystem volume handle (fs-xxxx[::access-point]).
    # -- EFS filesystem volume handle (fs-xxxx[::access-point])
    # @section -- Persistence
    volumeHandle:
  # @schema description: Fine-tuning options for the volumeClaimTemplate used by the StatefulSet.
  volumeClaimTemplates:
    ## @param persistence.volumeClaimTemplates.selector A label query over volumes to consider for binding (e.g. when using local volumes)
    ## A label query over volumes to consider for binding (e.g. when using local volumes)
    ## See https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.20/#labelselector-v1-meta for more details
    ##
    # @schema description: A label query over volumes to consider for binding (e.g. when using local volumes).
    # -- A label query over volumes to consider for binding (e.g. when using local volumes)
    # @section -- Persistence
    selector: {}
    ## @param persistence.volumeClaimTemplates.requests Custom PVC requests attributes
    ## Sometime cloud providers use additional requests attributes to provision custom storage instance
    ## See https://cloud.ibm.com/docs/containers?topic=containers-file_storage#file_dynamic_statefulset
    ##
    # @schema description: Custom PVC requests attributes (some cloud providers use additional attributes for storage provisioning).
    # -- Custom PVC requests attributes
    # @section -- Persistence
    requests: {}
    ## @param persistence.volumeClaimTemplates.dataSource Add dataSource to the VolumeClaimTemplate
    ##
    # @schema description: Add a dataSource to the VolumeClaimTemplate.
    # -- Add dataSource to the VolumeClaimTemplate
    # @section -- Persistence
    dataSource: {}
