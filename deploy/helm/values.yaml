# @schema description: Optional StorageClass managed by this chart.
storageClass:
  ## @param storageClass.enabled - Enable config storage class
  ##
  # @schema description: Enable creation of a StorageClass by this chart.
  enabled: false
  ## @param storageClass.bindingMode - the binding mode for PVCs using this storage class
