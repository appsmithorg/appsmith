## MongoDBCommunity cluster parameters
## Settings for the MongoDB replica set deployed via the MongoDBCommunity custom resource.
## See templates/mongodb-community.yaml for the CR definition and docs/install-mongodb-operator.md
## for the install guide. Pair with mongodbOperator.enabled=true below to bundle the operator.
##
## PREVIEW (chart 3.7.0): documented for fresh installs in this release. A documented
## migration path from an existing Bitnami-backed Appsmith release is being prepared
## separately — if you have an existing install, watch for that documentation before
## changing mongodbCommunity.enabled on a release with production data.
# @schema description: MongoDBCommunity cluster configuration. Pair with mongodbOperator.enabled=true to bundle the operator. PREVIEW (chart 3.7.0) — documented for fresh installs in this release. A documented migration path from an existing Bitnami-backed release is being prepared separately. See docs/install-mongodb-operator.md.
mongodbCommunity:
  ## @param mongodbCommunity.enabled Deploy a MongoDBCommunity custom resource
  # -- Deploy a MongoDBCommunity custom resource
  # @section -- MongoDB Community Operator
  enabled: false
  ## @param mongodbCommunity.name Name of the MongoDBCommunity custom resource
  ## When empty (default), the chart computes "<release-fullname>-mongo". The "-mongo" suffix
  ## (vs Bitnami's "-mongodb") keeps operator-managed resources from colliding with Bitnami
  ## StatefulSet names during the Mode B transition window. Override to pin a specific name.
  # -- Name of the MongoDBCommunity custom resource
  # @section -- MongoDB Community Operator
  name: "" # @schema maxLength: 60; pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
  ## @param mongodbCommunity.version MongoDB version to deploy
  # -- MongoDB version to deploy
  # @section -- MongoDB Community Operator
  version: "8.0.20"
  ## @param mongodbCommunity.members Number of replica set members
  ## Defaults to 1 to minimize footprint for evaluation and dev installs. For production
  ## HA, set to 3 (odd number recommended for replica set quorum). The operator handles
  ## scaling between these online — it's just a value change on upgrade.
  # -- Number of replica set members
  # @section -- MongoDB Community Operator
  members: 1 # @schema minimum: 1
  auth:
    ## @param mongodbCommunity.auth.username MongoDB user for Appsmith
    # -- MongoDB user for Appsmith
    # @section -- MongoDB Community Operator
    username: "appsmith" # @schema minLength: 1
    ## @param mongodbCommunity.auth.database Authentication database (also used as connection path)
    # -- Authentication database (also used as connection path)
    # @section -- MongoDB Community Operator
    database: "appsmith" # @schema minLength: 1
    ## @param mongodbCommunity.auth.passwordSecretName Name of an existing Secret containing the password (key: password)
    ## If empty, a pre-install Job generates a random password into a Secret named "{name}-password"
    # -- Name of an existing Secret containing the password (key: password)
    # @section -- MongoDB Community Operator
    passwordSecretName: ""
  persistent:
    ## @param mongodbCommunity.persistent.storageSize Storage size for each MongoDB replica
    # -- Storage size for each MongoDB replica
    # @section -- MongoDB Community Operator
    storageSize: "10Gi"
    ## @param mongodbCommunity.persistent.storageClass StorageClass for MongoDB PVCs (empty uses cluster default)
    # -- StorageClass for MongoDB PVCs (empty uses cluster default)
    # @section -- MongoDB Community Operator
    storageClass: ""
  ## @param mongodbCommunity.resources Resource requests/limits for MongoDB containers
  # -- Resource requests/limits for MongoDB containers
  # @section -- MongoDB Community Operator
  resources: {}
  ## @param mongodbCommunity.nodeSelector Node selector for MongoDB pods
  # -- Node selector for MongoDB pods
  # @section -- MongoDB Community Operator
  nodeSelector: {}
  ## @param mongodbCommunity.affinity Affinity rules for MongoDB pods
  # -- Affinity rules for MongoDB pods
  # @section -- MongoDB Community Operator
  affinity: {}
  ## @param mongodbCommunity.tolerations Tolerations for MongoDB pods
  # -- Tolerations for MongoDB pods
  # @section -- MongoDB Community Operator
  tolerations: []
  ## Password init Job image (pre-install/pre-upgrade hook that bootstraps the MongoDB user password Secret).
  ## The Job runs kubectl commands only, so any recent kubectl release works. Defaults to a floating tag
  ## because the upstream alpine/kubectl repository periodically retires older patch tags; pin a specific
  ## version if you need byte-level reproducibility.
  passwordInit:
    image:
      ## @param mongodbCommunity.passwordInit.image.registry Registry for the kubectl image
      # -- Registry for the kubectl image
      # @section -- MongoDB Community Operator
      registry: docker.io
      ## @param mongodbCommunity.passwordInit.image.repository Repository path for the kubectl image
      # -- Repository path for the kubectl image
      # @section -- MongoDB Community Operator
      repository: alpine/kubectl
      ## @param mongodbCommunity.passwordInit.image.tag Image tag. "latest" is used by default to sidestep upstream tag retention; pin for reproducibility.
      # -- Image tag. "latest" is used by default to sidestep upstream tag retention; pin for reproducibility.
      # @section -- MongoDB Community Operator
      tag: latest
      ## @param mongodbCommunity.passwordInit.image.pullPolicy Image pull policy for the Job
      # -- Image pull policy for the Job
      # @section -- MongoDB Community Operator
      pullPolicy: IfNotPresent

## MongoDB Kubernetes Operator subchart
## Values under this key are passed through to the upstream mongodb-kubernetes chart (aliased to mongodbOperator).
## Set mongodbOperator.enabled=true to bundle the operator with this release — it installs in the same namespace
## and reconciles the MongoDBCommunity CR defined above. Leave it false only if you're managing the operator
## separately and accept responsibility for its RBAC in this namespace.
##
## Ref: https://github.com/mongodb/mongodb-kubernetes/tree/main/helm_chart
## Values are passed through to the upstream mongodb-kubernetes subchart; not validated by this schema.
mongodbOperator: # @schema additionalProperties: true
  ## @param mongodbOperator.enabled Install the MongoDB Kubernetes Operator subchart
  # @schema description: Install the MongoDB Kubernetes Operator subchart alongside this chart.
  # -- Install the MongoDB Kubernetes Operator subchart
  # @section -- MongoDB Community Operator
  enabled: false
  ## @param mongodbOperator.operator.telemetry.enabled Enable the upstream operator's phone-home telemetry.
  ## Disabled by default. When enabled, the upstream chart installs a ClusterRole named
  ## "{operator.name}-cluster-telemetry" whose name does not include the operator's namespace, so it
  ## collides if multiple Appsmith releases (each bundling their own operator) are installed in the
  ## same cluster. Safe to re-enable if you run a single operator cluster-wide.
  # @schema hidden: true
  # -- Enable the upstream operator's phone-home telemetry
  # @section -- MongoDB Community Operator
  operator:
    telemetry:
      enabled: false

