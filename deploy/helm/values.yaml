  defaultClass: false
  ## @param storageClass.allowVolumeExpansion - allow expansion of PVCs using this storage class
  ##
  # @schema description: Allow PVC expansion for volumes using this StorageClass.
  allowVolumeExpansion: true
  ## @param storageClass.reclaimPolicy - configures the retention of the PV when dynamically created using this class
  ##
  # @schema description: Reclaim policy for PVs dynamically provisioned by this StorageClass.
  # @schema enum: [Retain, Delete]
  reclaimPolicy: Delete
  ## @param storageClass.provisioner - storage class parameters used for volumes created with this storage class
  ##
  # @schema description: Provisioner name for this StorageClass.
  provisioner: ""
  ## @param storageClass.annotations - annotations in yaml map format to be added to the object
  ##
  # @schema description: Annotations to add to the StorageClass.
  annotations: {}
  ## @param storageClass.mountOptions - options used by volumes created by this storage class
  ##
  # @schema description: Mount options used by volumes created with this StorageClass.
  mountOptions: {}
  ## @param storageClass.parameters - storage class parameters used for volumes created with this storage class
  ##
  # @schema description: Provisioner-specific parameters for this StorageClass.
  parameters: {}

# @schema description: PodDisruptionBudget configuration for the Appsmith workload.
podDisruptionBudgets:
  # @schema description: Enable a PodDisruptionBudget for Appsmith pods.
  enabled: true
  # @schema description: Minimum number of pods that must remain available during voluntary disruptions.
  minAvailable: 1

# @schema description: Metrics endpoint configuration.
metrics:
  # @schema description: Enable the Appsmith metrics endpoint.
  enabled: false
  # @schema description: Port number to expose metrics on.
  # @schema minimum: 1
  # @schema maximum: 65535
  port: 2019

# @schema description: KEDA-based autoscaling configuration. Mutually exclusive with the autoscaling block.
keda:
  # @schema description: Enable KEDA ScaledObject for Appsmith.
  enabled: false
  # @schema description: How often KEDA polls trigger sources, in seconds.
  pollingInterval: 30
  # @schema description: Cooldown period before scaling down, in seconds.
  cooldownPeriod: 60
  # @schema description: Minimum number of replicas KEDA will scale to.
  # @schema minimum: 0
  minReplicaCount: 1
  # @schema description: Maximum number of replicas KEDA will scale to.
  # @schema minimum: 0
  maxReplicaCount: 6
  # @schema description: Fallback configuration when triggers fail to fetch metrics.
  fallback:
    # @schema description: Number of consecutive trigger failures before falling back.
    failureThreshold: 3
    # @schema description: Replica count to fall back to.
    replicas: 4
  # @schema description: KEDA trigger definitions (passed through to the ScaledObject).
  triggers: []

# @schema description: Auto-update configuration for the Helm-managed image.
autoupdate:
  ## @param autoupdate.enabled - Enable config autoupdate
  ##
  # @schema description: Enable the auto-update CronJob.
  enabled: false
  ## @param autoupdate.scheduler - Schedule cron job to check & update Helm image
  ##
  # @schema description: CronJob schedule to check and update the Helm image. Must be a valid cron expression.
  scheduler: "0 * * * *"

