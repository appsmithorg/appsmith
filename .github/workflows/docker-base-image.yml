name: Docker Base Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * MON"
  workflow_call:
    inputs:
      tag:
        description: "Docker tag override (e.g. release, nightly). Defaults to branch-based detection."
        required: false
        type: string
        default: ""

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout the head commit of the branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if base.dockerfile changed
        id: check
        if: github.event_name == 'workflow_call'
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -q "deploy/docker/base.dockerfile"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Get tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME//\//-}"
            if [[ "$tag" == master ]]; then
              tag=nightly
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Build and push base image
        if: steps.check.outputs.changed != 'false'
        uses: depot/build-push-action@v1
        with:
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          context: .
          file: deploy/docker/base.dockerfile
          push: true
          pull: true
          # do not cache so we get fresh OS packages each time
          no-cache: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ${{ vars.DOCKER_HUB_ORGANIZATION }}/base-${{ vars.EDITION }}:${{ steps.tag.outputs.tag }}
